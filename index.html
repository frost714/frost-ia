<!DOCTYPE html>
<html>
<head>
<title>Frost IA</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

#chat{
width:90%;
max-width:600px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:10px;
}

input{
width:70%;
padding:10px;
}

button{
padding:10px;
}

</style>

</head>

<body>

<h1>Frost IA ❄️</h1>

<div id="chat">

<div id="msgs"></div>

<input id="msg" placeholder="Pergunte algo">
<button onclick="enviar()">Enviar</button>

</div>

<script>

async function enviar(){

let msg=document.getElementById("msg").value

document.getElementById("msgs").innerHTML+=
"<p><b>Você:</b> "+msg+"</p>"

let res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({msg:msg})
})

let data=await res.json()

document.getElementById("msgs").innerHTML+=
"<p><b>Frost:</b> "+data.resposta+"</p>"

document.getElementById("msg").value=""

}

</script>

</body>
</html>
